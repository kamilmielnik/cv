name: Format

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  oxfmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.x
    - run: bun install --frozen-lockfile
    - run: bun run format
      env:
        CI: true
